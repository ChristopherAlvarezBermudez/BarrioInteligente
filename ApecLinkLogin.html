<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEC Link - Portal de Tutorías y Recursos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#004080',
                        primaryHover: '#003366'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Estilos base para inputs numéricos y scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Animaciones personalizadas */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen flex items-center justify-center relative bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
    
    <!-- Filtro oscuro/azulado en el fondo para ambientación académica -->
    <div class="absolute inset-0 bg-blue-900/60 backdrop-blur-md"></div>
    
    <!-- Contenedor Raíz de React -->
    <div id="root" class="relative z-10 w-full max-w-md mx-4 drop-shadow-2xl my-8"></div>

    <!-- Script de React Principal -->
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('login'); // 'login' o 'activate'

            return (
                <div className="bg-white rounded-2xl shadow-2xl overflow-hidden w-full ring-1 ring-black/5 animate-fade-in">
                    {/* Encabezado Superior */}
                    <div className="bg-primary px-8 py-8 text-center text-white relative overflow-hidden">
                        <div className="relative z-10">
                            <h1 className="text-3xl font-extrabold tracking-tight">APEC Link</h1>
                            <p className="text-sm font-medium text-blue-100 mt-2">Portal de Tutorías y Recursos</p>
                        </div>
                        {/* Decoración geométrica */}
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                    </div>

                    {/* Selector de Pestañas (Tabs) */}
                    <div className="flex border-b border-gray-200 bg-gray-50/50">
                        <button 
                            onClick={() => setActiveTab('login')}
                            className={`flex-1 py-4.5 px-2 text-sm font-semibold text-center transition-all duration-200 ${
                                activeTab === 'login' 
                                ? 'text-primary border-b-[3px] border-primary bg-white' 
                                : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100 border-b-[3px] border-transparent'
                            }`}
                            style={{ paddingBottom: '16px', paddingTop: '16px' }}
                        >
                            Iniciar Sesión
                        </button>
                        <button 
                            onClick={() => setActiveTab('activate')}
                            className={`flex-1 py-4.5 px-2 text-sm font-semibold text-center transition-all duration-200 ${
                                activeTab === 'activate' 
                                ? 'text-primary border-b-[3px] border-primary bg-white' 
                                : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100 border-b-[3px] border-transparent'
                            }`}
                            style={{ paddingBottom: '16px', paddingTop: '16px' }}
                        >
                            Activar Cuenta Institucional
                        </button>
                    </div>

                    {/* Contenedor Principal (Cambia según la pestaña) */}
                    <div className="p-8">
                        {activeTab === 'login' ? (
                            <div className="space-y-6 animate-fade-in" key="tab-login">
                                <div className="text-center mb-2">
                                    <h2 className="text-2xl font-bold text-gray-900">Bienvenido a APEC Link</h2>
                                    <p className="text-sm text-gray-500 mt-1.5">Ingresa con tus credenciales de UNAPEC</p>
                                </div>
                                <div className="space-y-4.5 mt-6">
                                    <div className="space-y-1.5">
                                        <label className="block text-sm font-semibold text-gray-700">Correo Institucional</label>
                                        <input 
                                            type="email" 
                                            placeholder="usuario@unapec.edu.do" 
                                            className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-gray-800 bg-gray-50 focus:bg-white" 
                                        />
                                    </div>
                                    <div className="space-y-1.5 pt-4">
                                        <label className="block text-sm font-semibold text-gray-700">Contraseña</label>
                                        <input 
                                            type="password" 
                                            placeholder="••••••••" 
                                            className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-gray-800 bg-gray-50 focus:bg-white" 
                                        />
                                    </div>
                                    <div className="flex items-center justify-between pt-2">
                                        <label className="flex items-center cursor-pointer group">
                                            <input type="checkbox" className="w-4.5 h-4.5 text-primary border-gray-300 rounded cursor-pointer focus:ring-primary focus:ring-2 focus:ring-offset-1 transition-all" />
                                            <span className="ml-2.5 text-sm font-medium text-gray-600 group-hover:text-gray-900 transition-colors">Recuérdame</span>
                                        </label>
                                        <a href="#" className="text-sm text-primary hover:text-primaryHover font-semibold transition-colors">¿Olvidaste tu contraseña?</a>
                                    </div>
                                </div>
                                
                                <div className="pt-2">
                                    <button className="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-[0.98]">
                                        Ingresar
                                    </button>
                                </div>
                                
                                <div className="relative my-7">
                                    <div className="absolute inset-0 flex items-center">
                                        <div className="w-full border-t border-gray-200"></div>
                                    </div>
                                    <div className="relative flex justify-center text-sm">
                                        <span className="px-3 bg-white text-gray-400 font-medium">O ingresar con</span>
                                    </div>
                                </div>

                                <button className="w-full bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                                    <svg viewBox="0 0 21 21" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M10 0H0v10h10V0z" fill="#f25022"/>
                                        <path d="M21 0H11v10h10V0z" fill="#7fba00"/>
                                        <path d="M10 11H0v10h10V11z" fill="#00a4ef"/>
                                        <path d="M21 11H11v10h10V11z" fill="#ffb900"/>
                                    </svg>
                                    Microsoft 365
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-fade-in" key="tab-activate">
                                <div className="text-center mb-2">
                                    <h2 className="text-2xl font-bold text-gray-900">Activa tu acceso a APEC Link</h2>
                                    <p className="text-sm text-gray-500 mt-1.5">Verifica tu matrícula para usar el sistema de tutorías</p>
                                </div>
                                <div className="space-y-4 mt-6">
                                    <div className="space-y-1.5">
                                        <label className="block text-sm font-semibold text-gray-700">Matrícula</label>
                                        <input 
                                            type="text" 
                                            placeholder="Ej. A00123456" 
                                            className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-gray-800 bg-gray-50 focus:bg-white" 
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="block text-sm font-semibold text-gray-700">Correo Institucional</label>
                                        <input 
                                            type="email" 
                                            placeholder="usuario@unapec.edu.do" 
                                            className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-gray-800 bg-gray-50 focus:bg-white" 
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="block text-sm font-semibold text-gray-700">Crear Contraseña</label>
                                        <input 
                                            type="password" 
                                            placeholder="••••••••" 
                                            className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-gray-800 bg-gray-50 focus:bg-white" 
                                        />
                                    </div>
                                </div>
                                <div className="pt-4">
                                    <button className="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-[0.98]">
                                        Activar Cuenta
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer Inferior */}
                    <div className="bg-gray-50/80 px-8 py-5 border-t border-gray-100">
                        <p className="text-[13px] leading-relaxed text-center text-gray-500 font-medium">
                            Sistema integrado con Banner UNAPEC.<br/>
                            Soporte TI: <a href="mailto:soporte@unapec.edu.do" className="text-primary hover:text-primaryHover hover:underline transition-colors">soporte@unapec.edu.do</a>
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
